<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZoTok Demo Preview</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; font-family: sans-serif; }
    #loader { display: flex; align-items: center; justify-content: center; height: 100%; width: 100%; flex-direction: column; color: #666; }
    .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #075e54; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin-bottom: 12px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    iframe { border: none; width: 100%; height: 100%; display: none; }
  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner"></div>
    <div id="statusText">Loading demo...</div>
  </div>

  <iframe id="demoFrame" sandbox="allow-scripts allow-same-origin"></iframe>

  <script src="js/handlebars.min.js"></script>
  <script src="js/lz-string.min.js"></script>
  <script src="js/demo-renderer.js?v=3"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var hash = window.location.hash || '';
      var parts = hash.split('/');
      var statusText = document.getElementById('statusText');

      if (parts[1] === 'id') {
        var owner = 'TheKanishkaMohan';
        var repo = 'zotok-demo-gen';
        var branch = 'main';
        var id = '';

        if (parts.length >= 6) {
          // Long format: #/id/{owner}/{repo}/{branch}/{id}
          owner = parts[2];
          repo = parts[3];
          branch = parts[4];
          id = parts[5];
        } else {
          // Short format: #/id/{id}
          id = parts[2];
          
          // Auto-detect owner and repo from GitHub Pages URL if applicable
          var host = window.location.hostname;
          if (host.indexOf('.github.io') !== -1) {
            owner = host.split('.')[0];
            var pathParts = window.location.pathname.split('/');
            if (pathParts.length > 1 && pathParts[1]) {
              repo = pathParts[1];
            }
          }
        }

        if (!id) {
          statusText.textContent = "Error: Invalid preview link format.";
          statusText.style.color = "red";
          document.querySelector('.spinner').style.display = 'none';
          return;
        }

        statusText.textContent = "Fetching demo configuration from GitHub...";
        
        var rawUrl = 'https://raw.githubusercontent.com/' + owner + '/' + repo + '/' + branch + '/demos/' + id + '.json';
        
        fetch(rawUrl)
          .then(function(res) {
            if (!res.ok) throw new Error('Could not find configuration file on GitHub (HTTP ' + res.status + ')');
            return res.json();
          })
          .then(function(config) {
            renderDemo(config);
          })
          .catch(function(err) {
            console.warn('[preview] Failed to fetch from raw.githubusercontent.com, trying local fallback...', err);
            // Fallback to relative file check in case it's a local build or deployed Pages segment
            var localUrl = 'demos/' + id + '.json';
            statusText.textContent = "Fetching local fallback demo...";
            return fetch(localUrl)
              .then(function(res2) {
                if (!res2.ok) throw err; // throw original error if local also fails
                return res2.json();
              })
              .then(function(config) {
                renderDemo(config);
              })
              .catch(function(err2) {
                statusText.textContent = "Error loading demo configuration: " + err2.message;
                statusText.style.color = "red";
                document.querySelector('.spinner').style.display = 'none';
              });
          });
      } else {
        // Fallback to legacy compression method
        var compressedData = parts.length > 1 ? parts[1] : null;
        if (!compressedData) {
          statusText.textContent = "Error: No demo configuration found in the URL.";
          statusText.style.color = "red";
          document.querySelector('.spinner').style.display = 'none';
          return;
        }

        try {
          var jsonStr = window.LZString ? window.LZString.decompressFromEncodedURIComponent(compressedData) : decodeURIComponent(compressedData);
          if (!jsonStr) throw new Error("Decompression failed");
          
          var config = JSON.parse(jsonStr);
          renderDemo(config);
        } catch (err) {
          console.error(err);
          statusText.textContent = "Error parsing demo configuration: " + err.message;
          statusText.style.color = "red";
          document.querySelector('.spinner').style.display = 'none';
        }
      }

      function renderDemo(config) {
        // Save config to localStorage for the hydration script inside the iframe
        try {
          var configPayload = {
            products: config.products,
            brandName: config.name,
            primaryColor: config.brandColor,
            storeName: config.name + ' Store'
          };
          localStorage.setItem('zotok.demoConfig', JSON.stringify(configPayload));
        } catch (e) {
          console.warn('[preview] Could not save demoConfig to localStorage:', e);
        }

        // Load the template pack and render the demo
        DemoRenderer.loadPack()
          .then(function() {
            return DemoRenderer.renderMultiJourney(config);
          })
          .then(function(result) {
            // Write the generated HTML into the iframe
            var iframe = document.getElementById('demoFrame');
            iframe.srcdoc = result.html;
            
            document.getElementById('loader').style.display = 'none';
            iframe.style.display = 'block';
            document.title = (config.name || 'Demo') + " — ZoTok Preview";
          })
          .catch(function(err) {
            console.error(err);
            statusText.textContent = "Error rendering demo: " + err.message;
            statusText.style.color = "red";
            document.querySelector('.spinner').style.display = 'none';
          });
      }
    });
  </script>
</body>
</html>
